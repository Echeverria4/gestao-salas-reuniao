<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reservar Sala de Reunião</title>

  <!-- Office.js DEVE ser o primeiro script carregado -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #1a6b3a;
      --green-l: #e8f5ee;
      --red:     #dc2626;
      --red-l:   #fff0f0;
      --ink:     #1c1f1a;
      --ink-2:   #4b5563;
      --muted:   #6b7280;
      --line:    #e5e7eb;
      --surface: #ffffff;
      --bg:      #f3f4f2;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: var(--ink);
      background: var(--bg);
      min-height: 100vh;
    }

    #app { padding: 16px; }

    .header {
      display: flex; align-items: center; gap: 10px;
      padding-bottom: 14px; border-bottom: 1px solid var(--line);
      margin-bottom: 16px;
    }
    .header-logo {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--green); display: flex; align-items: center; justify-content: center;
    }
    .header-logo svg { color: #fff; }
    .header-title { font-weight: 700; font-size: 13.5px; }
    .header-sub   { font-size: 11px; color: var(--muted); }

    .card {
      background: var(--surface); border-radius: 10px;
      border: 1px solid var(--line); padding: 14px; margin-bottom: 12px;
    }
    .card-label {
      font-size: 10.5px; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }

    .meeting-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
    .meeting-title { font-weight: 700; font-size: 13.5px; flex: 1; margin-right: 8px; }
    .meeting-time  { font-size: 12px; color: var(--muted); white-space: nowrap; }

    label { display: block; font-size: 11.5px; font-weight: 600; color: var(--ink-2); margin-bottom: 4px; }
    select, input {
      width: 100%; padding: 8px 10px; border: 1px solid var(--line);
      border-radius: 7px; font-size: 13px; background: var(--surface);
      color: var(--ink); outline: none; appearance: none;
    }
    select:focus, input:focus { border-color: var(--green); box-shadow: 0 0 0 2px #1a6b3a22; }

    .field { margin-bottom: 10px; }

    .room-list { display: flex; flex-direction: column; gap: 6px; }
    .room-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px; border: 1.5px solid var(--line);
      cursor: pointer; transition: border-color .15s, background .15s;
    }
    .room-item:hover { border-color: var(--green); background: var(--green-l); }
    .room-item.selected { border-color: var(--green); background: var(--green-l); }
    .room-item.busy { opacity: .45; cursor: not-allowed; pointer-events: none; }
    .room-dot { width: 10px; height: 10px; border-radius: 999px; flex-shrink: 0; }
    .room-name { font-weight: 600; font-size: 13px; flex: 1; }
    .room-cap  { font-size: 11px; color: var(--muted); }
    .room-busy-badge {
      font-size: 10px; padding: 2px 6px; border-radius: 99px;
      background: #fee2e2; color: var(--red); font-weight: 600;
    }

    .btn {
      width: 100%; padding: 11px; border-radius: 8px; border: none;
      font-size: 13.5px; font-weight: 700; cursor: pointer; transition: opacity .15s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: .88; }
    .btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--ink-2); margin-top: 6px; }

    .alert {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 10px 12px; border-radius: 8px; font-size: 12.5px;
      margin-bottom: 12px; line-height: 1.5;
    }
    .alert-ok  { background: var(--green-l); color: #145c30; border: 1px solid #86efac; }
    .alert-err { background: var(--red-l);   color: #991b1b; border: 1px solid #fca5a5; }
    .alert-info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }

    .loading { text-align: center; padding: 40px 0; color: var(--muted); font-size: 13px; }
    .spinner {
      width: 24px; height: 24px; border: 2.5px solid var(--line);
      border-top-color: var(--green); border-radius: 50%;
      animation: spin .7s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .success-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--green-l); display: flex; align-items: center;
      justify-content: center; margin: 0 auto 14px;
    }

    .divider { height: 1px; background: var(--line); margin: 12px 0; }

    .login-form { max-width: 100%; }
    .login-form h2 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .login-form p  { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      Iniciando…
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../config.js"></script>
  <script src="taskpane.js"></script>
</body>
</html>
