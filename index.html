<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestão de Salas de Reunião</title>
  <meta name="description" content="Sistema corporativo para gestão e agendamento de salas de reunião por andar." />
  <link rel="icon" href="logo.png" type="image/png" />

  <!-- Open Graph (preview WhatsApp / redes sociais) -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://salas-de-reuniao.vercel.app/" />
  <meta property="og:title"       content="Gestão de Salas de Reunião" />
  <meta property="og:description" content="Agende salas de reunião online." />
  <meta property="og:image"       content="https://salas-de-reuniao.vercel.app/og-image.png" />
  <meta property="og:image:width"  content="200" />
  <meta property="og:image:height" content="200" />
  <meta name="twitter:card"       content="summary" />

  <!-- Fontes IBM Plex -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Encode+Sans+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root">
    <div style="display:grid;place-items:center;height:100vh;font-family:sans-serif;color:#64748b">Carregando…</div>
  </div>

  <!-- Supabase JS (UMD — expõe window.supabase) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <!-- React + ReactDOM + Babel (sem build step) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

  <!-- Configuração + camada de dados -->
  <script src="config.js"></script>
  <script src="data.js"></script>

  <!-- App (transpilado pelo Babel no browser) -->
  <script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
